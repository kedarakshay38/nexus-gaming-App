<a [routerLink]="['/games', game.id]" class="game-card">
  <div class="image-container">
    <img [src]="game.imageUrl || 'assets/img/placeholder.png'" [alt]="game.title" class="game-image">
    <div class="badge-container">
      <button 
        class="wishlist-btn" 
        [class.active]="isWishlisted"
        (click)="toggleWishlist($event)"
      >
        ♥
      </button>
    </div>
  </div>
  <div class="card-content">
    <h3 class="title">{{ game.title }}</h3>
    <div class="meta">
      <span class="genre">{{ game.genre[0] }}</span>
      <span class="rating">★ {{ game.rating }}</span>
    </div>
    <div class="footer">
      <span class="price">${{ game.price.toFixed(2) }}</span>
      <button class="add-cart-btn" (click)="addToCart($event)">ADD</button>
    </div>
  </div>
</a>
