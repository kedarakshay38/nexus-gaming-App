<div class="auth-container">
  <div class="auth-box">
    <h1 class="glitch" data-text="SYSTEM LOGIN">SYSTEM LOGIN</h1>
    <p class="subtitle">Access your Nexus profile</p>

    <div *ngIf="error" class="error-msg">
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email">IDENTITY (EMAIL)</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          class="cyber-input"
          placeholder="user@nexus.io"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">SECURITY KEY (PASSWORD)</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          class="cyber-input"
          placeholder="••••••••"
          required
        >
      </div>

      <button type="submit" class="btn-primary auth-btn" [disabled]="loading || loginForm.invalid">
        {{ loading ? 'AUTHENTICATING...' : 'INITIALIZE CONNECTION' }}
      </button>
    </form>

    <div class="auth-links">
      <p>No profile found? <a routerLink="/signup">Establish identity</a></p>
    </div>
  </div>
</div>
